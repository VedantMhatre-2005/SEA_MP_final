# ─────────────────────────────────────────────────────────────────────────────
# ASPRAMS CI/CD Pipeline
# Triggers on push to main branch.
# Steps: install deps → test backend → build frontend → success message
# ─────────────────────────────────────────────────────────────────────────────

name: ASPRAMS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Job ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: asprams/backend

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: asprams/backend/requirements.txt

      - name: 📦 Install backend dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Lint with flake8
        run: |
          pip install flake8
          # Error on syntax errors or undefined names; warn on style
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=110 --statistics

      - name: 🚀 Start FastAPI server in background
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ secrets.JIRA_DOMAIN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Wait for the server to be ready
          for i in {1..20}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "✅ Server is ready"
              break
            fi
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: ✅ Run API tests
        run: pytest tests/ -v --tb=short

  # ── Frontend Job ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: asprams/frontend

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ⬢ Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: asprams/frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        run: npm ci

      - name: 🔨 Build frontend (Vite)
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: 🎉 Build successful!
        run: echo "✅ ASPRAMS frontend build complete — artifacts in dist/"

  # ── All Clear ────────────────────────────────────────────────────────────────
  all-clear:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: 🎉 Success
        run: echo "🚀 ASPRAMS CI/CD pipeline completed successfully!"
